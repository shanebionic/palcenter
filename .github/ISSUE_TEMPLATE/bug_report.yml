name: Bug report
description: Report a reproducible problem with PalCenter
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include passwords, webhook URLs, backup archives, session secrets, or other sensitive data.
  - type: input
    id: version
    attributes:
      label: PalCenter version
      description: Use the version shown in About PalCenter or the deployed image tag.
      placeholder: v1.1.1
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Unraid Community Applications
        - Docker Compose
        - Docker run
        - Local development
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe what happened and what you expected.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable sequence that reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove credentials, tokens, private addresses, and other sensitive values.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched for an existing issue.
          required: true
        - label: I removed sensitive information from this report.
          required: true
